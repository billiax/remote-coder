<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Coder</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a0c;
  --bg-panel: #111114;
  --bg-surface: #18181c;
  --bg-hover: #1f1f24;
  --bg-active: #26262c;
  --border: #2a2a32;
  --border-subtle: #1e1e25;
  --text-primary: #e4e4e8;
  --text-secondary: #8a8a96;
  --text-muted: #55555f;
  --accent: #c4815c;
  --accent-dim: #9e6844;
  --accent-glow: rgba(196, 129, 92, 0.12);
  --user-bg: #1a1d2a;
  --claude-bg: #141416;
  --danger: #c45c5c;
  --success: #5cc47a;
  --tool-bg: #12141a;
  --tool-border: #1c2030;
  --tool-header: #161a24;
  --radius: 6px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  display: flex;
  overflow: hidden;
}

/* ---- Sidebar ---- */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border-subtle);
}

.sidebar-logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-logo::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  display: inline-block;
}

.btn-new {
  width: 100%;
  padding: 9px 12px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.btn-new:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: var(--accent-glow);
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-track { background: transparent; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.session-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 2px;
  position: relative;
}

.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-active); }

.session-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.session-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-model {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-left: 6px;
  flex-shrink: 0;
}

.session-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.session-item:hover .session-delete { opacity: 1; }
.session-delete:hover { color: var(--danger); background: rgba(196,92,92,0.1); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-api-help {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-api-help:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
}

/* API docs modal */
.modal-wide { width: 560px; max-height: 80vh; overflow-y: auto; }
.modal-wide::-webkit-scrollbar { width: 4px; }
.modal-wide::-webkit-scrollbar-track { background: transparent; }
.modal-wide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.api-section { margin-bottom: 20px; }

.api-section h4 {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}

.api-section .method {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-primary);
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px 8px;
  display: inline-block;
  margin-right: 6px;
}

.api-section .endpoint {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
}

.api-section .desc {
  font-size: 12px;
  color: var(--text-muted);
  margin: 6px 0;
  line-height: 1.5;
}

.api-code {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text-secondary);
  white-space: pre;
  overflow-x: auto;
  line-height: 1.55;
  margin: 8px 0;
}

.api-code .hl { color: var(--accent); }
.api-code .cm { color: var(--text-muted); }

/* ---- Main ---- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
}

.main-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-panel);
}

.main-header .workspace-badge {
  background: var(--bg-surface);
  padding: 3px 10px;
  border-radius: 3px;
  color: var(--accent);
  font-size: 12px;
  border: 1px solid var(--border-subtle);
}

.main-header .model-badge {
  background: var(--bg-surface);
  padding: 3px 10px;
  border-radius: 3px;
  color: var(--text-muted);
  font-size: 11px;
  border: 1px solid var(--border-subtle);
}

.header-spacer { flex: 1; }

.btn-compact {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-compact:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
}

.btn-compact:disabled { opacity: 0.3; cursor: not-allowed; }

/* Modal select */
.modal select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
  appearance: none;
  cursor: pointer;
}

.modal select:focus { border-color: var(--accent-dim); }

.modal label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

/* ---- Chat area ---- */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 32px;
  opacity: 0.3;
  font-family: var(--font-mono);
}

.empty-state p {
  font-size: 13px;
  font-family: var(--font-mono);
}

/* ---- Messages ---- */
.message {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.7;
  animation: msgIn 0.25s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: var(--user-bg);
  border: 1px solid #252840;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
}

.msg-images {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  white-space: normal;
}

.msg-image {
  max-width: 300px;
  max-height: 200px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
  object-fit: contain;
  background: var(--bg-deep);
}

.msg-image:hover {
  opacity: 0.85;
}

.message.claude {
  align-self: flex-start;
  background: var(--claude-bg);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
  max-width: 90%;
}

.message.claude .meta {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
  letter-spacing: 0.03em;
}

/* ---- Tool result messages (from user role) ---- */
.message.tool-result {
  align-self: flex-end;
  background: var(--tool-bg);
  border: 1px solid var(--tool-border);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  max-width: 70%;
  padding: 0;
  overflow: visible;
  line-height: normal;
}

.tool-result-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--tool-header);
  border-bottom: 1px solid var(--tool-border);
  cursor: pointer;
  user-select: none;
}

.tool-result-header:hover { background: var(--bg-hover); }

.tool-result-icon {
  font-size: 11px;
  color: var(--accent-dim);
  flex-shrink: 0;
}

.tool-result-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.03em;
}

.tool-result-chevron {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 10px;
  transition: transform 0.2s;
}

.tool-result-chevron.open { transform: rotate(90deg); }

.tool-result-body {
  padding: 10px 14px;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
  line-height: 1.5;
  display: none;
}

.tool-result-body.open { display: block; }

.tool-result-body::-webkit-scrollbar { width: 4px; }
.tool-result-body::-webkit-scrollbar-track { background: transparent; }
.tool-result-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ---- Tool calls inside assistant messages ---- */
.tool-call-block {
  margin: 10px 0;
  border: 1px solid var(--tool-border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--tool-bg);
}

.tool-call-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--tool-header);
  border-bottom: 1px solid var(--tool-border);
  cursor: pointer;
  user-select: none;
  font-family: var(--font-mono);
  font-size: 11px;
}

.tool-call-header:hover { background: var(--bg-hover); }

.tool-call-icon {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
}

.tool-call-icon.tool-use {
  background: rgba(92, 129, 196, 0.15);
  color: #7b9fd4;
}

.tool-call-icon.tool-result-inline {
  background: rgba(92, 196, 122, 0.15);
  color: var(--success);
}

.tool-call-icon.tool-error {
  background: rgba(196, 92, 92, 0.15);
  color: var(--danger);
}

.tool-call-label {
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.02em;
}

.tool-call-name {
  color: var(--accent);
  font-weight: 500;
}

.tool-call-chevron {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 10px;
  transition: transform 0.2s;
}

.tool-call-chevron.open { transform: rotate(90deg); }

.tool-call-body {
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
  line-height: 1.5;
  display: none;
}

.tool-call-body.open { display: block; }

.tool-call-body::-webkit-scrollbar { width: 4px; }
.tool-call-body::-webkit-scrollbar-track { background: transparent; }
.tool-call-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Markdown inside claude messages */
.message.claude h1, .message.claude h2, .message.claude h3 {
  font-family: var(--font-sans);
  font-weight: 600;
  margin: 14px 0 6px;
  color: var(--text-primary);
}

.message.claude h1 { font-size: 18px; }
.message.claude h2 { font-size: 16px; }
.message.claude h3 { font-size: 14px; }
.message.claude p { margin: 6px 0; }
.message.claude ul, .message.claude ol { padding-left: 20px; margin: 6px 0; }
.message.claude li { margin: 3px 0; }

.message.claude code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border-subtle);
}

.message.claude pre {
  margin: 10px 0;
  border-radius: var(--radius);
  overflow-x: auto;
  border: 1px solid var(--border);
  background: var(--bg-deep) !important;
}

.message.claude pre code {
  display: block;
  padding: 12px 16px;
  background: transparent;
  border: none;
  line-height: 1.55;
  white-space: pre;
  overflow-x: auto;
}

.message.claude a {
  color: var(--accent);
  text-decoration: none;
}

.message.claude a:hover { text-decoration: underline; }

.message.claude table {
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
  width: 100%;
}

.message.claude th, .message.claude td {
  padding: 6px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.message.claude th {
  background: var(--bg-surface);
  font-weight: 500;
}

.message.claude blockquote {
  border-left: 3px solid var(--accent-dim);
  padding-left: 14px;
  color: var(--text-secondary);
  margin: 8px 0;
}

.message.claude hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}

/* Loading indicator */
.message.loading {
  align-self: flex-start;
  background: var(--claude-bg);
  border: 1px solid var(--border-subtle);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.loading-dots {
  display: flex;
  gap: 4px;
}

.loading-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-dim);
  animation: pulse 1.4s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ---- Input bar ---- */
.input-bar {
  padding: 16px 24px;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-panel);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-bar textarea {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  min-height: 42px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.2s;
}

.input-bar textarea:focus { border-color: var(--accent-dim); }

.input-bar textarea::placeholder {
  color: var(--text-muted);
}

.btn-send {
  padding: 10px 20px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #0a0a0c;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.btn-send:hover { background: #d4916c; }
.btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

/* ---- Modal ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.15s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 360px;
  animation: slideUp 0.2s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal h3 {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: 0.03em;
}

.modal p {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.modal input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.modal input:focus { border-color: var(--accent-dim); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.modal-actions button {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}

.btn-cancel {
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: 1px solid var(--border) !important;
}

.btn-cancel:hover { background: var(--bg-hover); }

.btn-confirm {
  background: var(--accent);
  color: #0a0a0c;
  font-weight: 600;
}

.btn-confirm:hover { background: #d4916c; }

/* Error toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-surface);
  border: 1px solid var(--danger);
  color: var(--text-primary);
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font-mono);
  z-index: 200;
  animation: fadeIn 0.2s ease-out;
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Remote Coder</div>

  <div class="sidebar-footer">
    <span>sessions are in-memory</span>
    <button class="btn-api-help" onclick="window.open('/api-docs','_blank')">api docs</button>
    <button class="btn-api-help" onclick="logout()">logout</button>
  </div>
</aside>

<main class="main">
  <div class="main-header" id="mainHeader">
    <span>select or create a session</span>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-state-icon">&gt;_</div>
      <p>start a session to begin</p>
    </div>
  </div>
  <div class="input-bar">
    <textarea id="messageInput" placeholder="send a message..." rows="1" disabled></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>send</button>
  </div>
</main>

<div id="modalContainer"></div>

<script>
const API = '';
let sessions = {};       // { sessionId: { workspace, model, messages: [{role,content,meta?}] } }
let activeSessionId = null;
let sending = false;

// --- API Key ---
const urlKey = new URLSearchParams(location.search).get('apiKey');
let apiKey = urlKey || localStorage.getItem('apiKey') || '';
if (urlKey) {
  localStorage.setItem('apiKey', urlKey);
  history.replaceState(null, '', location.pathname);
}

function authHeaders(extra = {}) {
  return { 'X-API-Key': apiKey, ...extra };
}

function authFetch(url, opts = {}) {
  opts.headers = { ...authHeaders(), ...(opts.headers || {}) };
  return fetch(url, opts);
}

function showKeyModal() {
  const container = document.getElementById('modalContainer');
  container.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <h3>api key required</h3>
        <p>enter the API key to access this service</p>
        <input type="password" id="apiKeyInput" placeholder="your-api-key" autofocus
               onkeydown="if(event.key==='Enter')submitApiKey()">
        <div class="modal-actions">
          <button class="btn-confirm" onclick="submitApiKey()">connect</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('apiKeyInput').focus(), 50);
}

async function submitApiKey() {
  const input = document.getElementById('apiKeyInput');
  const key = input.value.trim();
  if (!key) return;
  try {
    const res = await fetch(`${API}/sessions`, { headers: { 'X-API-Key': key } });
    if (res.status === 401) { showToast('invalid api key'); return; }
    apiKey = key;
    localStorage.setItem('apiKey', key);
    closeModal();
    fetchSessions();
  } catch (e) {
    showToast('connection failed');
  }
}

// --- Markdown ---
marked.setOptions({
  breaks: true,
  gfm: true,
});

// --- Message content parsing ---
// Detects tool result messages: "[TOOL RESULT: <name>]" or quoted version
function isToolResultMessage(content) {
  const s = content.trim().replace(/^["']|["']$/g, '');
  return /^\[TOOL RESULT:\s*\w+/.test(s);
}

// Parse tool result: extract name and body
function parseToolResult(content) {
  // Strip surrounding quotes if present
  let s = content.trim();
  if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) {
    s = s.slice(1, -1);
  }
  const match = s.match(/^\[TOOL RESULT:\s*(\w+)\]\s*([\s\S]*)$/);
  if (!match) return null;
  return { name: match[1], body: match[2].trim() };
}

// Parse assistant message content into segments: text, tool_use, tool_result
function parseAssistantContent(content) {
  if (!content) return [];

  const segments = [];
  // Split on tool code fences: ```tool:name ... ```
  // and also on inline tool patterns
  const lines = content.split('\n');
  let currentText = [];
  let inToolBlock = false;
  let toolName = '';
  let toolBody = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Start of a tool code fence: ```tool:name
    const toolStart = line.match(/^```tool:(\S+)\s*$/);
    if (toolStart && !inToolBlock) {
      // Flush current text
      if (currentText.length > 0) {
        const text = currentText.join('\n').trim();
        if (text) segments.push({ type: 'text', content: text });
        currentText = [];
      }
      inToolBlock = true;
      toolName = toolStart[1];
      toolBody = [];
      continue;
    }

    // End of tool code fence
    if (inToolBlock && line.trim() === '```') {
      segments.push({ type: 'tool_use', name: toolName, content: toolBody.join('\n') });
      inToolBlock = false;
      toolName = '';
      toolBody = [];
      continue;
    }

    if (inToolBlock) {
      toolBody.push(line);
    } else {
      currentText.push(line);
    }
  }

  // Flush remaining
  if (inToolBlock) {
    // Unclosed tool block — treat as tool anyway
    segments.push({ type: 'tool_use', name: toolName, content: toolBody.join('\n') });
  }
  if (currentText.length > 0) {
    const text = currentText.join('\n').trim();
    if (text) segments.push({ type: 'text', content: text });
  }

  return segments;
}

// Render a single tool block (used in both tool results and tool calls)
let toolBlockCounter = 0;

function renderToolBlock(type, name, body, defaultOpen = false) {
  const id = 'tb-' + (++toolBlockCounter);
  const iconClass = type === 'tool_use' ? 'tool-use' : (body && /error/i.test(body.slice(0, 50)) ? 'tool-error' : 'tool-result-inline');
  const iconSymbol = type === 'tool_use' ? '&#9654;' : '&#10003;';
  const label = type === 'tool_use' ? 'tool' : 'result';
  const openClass = defaultOpen ? ' open' : '';

  return `<div class="tool-call-block">
    <div class="tool-call-header" onclick="toggleToolBlock('${id}')">
      <div class="tool-call-icon ${iconClass}">${iconSymbol}</div>
      <span class="tool-call-label">${esc(label)}</span>
      <span class="tool-call-name">${esc(name)}</span>
      <span class="tool-call-chevron${openClass}" id="${id}-chev">&#9656;</span>
    </div>
    <div class="tool-call-body${openClass}" id="${id}-body">${esc(body)}</div>
  </div>`;
}

function toggleToolBlock(id) {
  const body = document.getElementById(id + '-body');
  const chev = document.getElementById(id + '-chev');
  if (body && chev) {
    body.classList.toggle('open');
    chev.classList.toggle('open');
  }
}

function renderMessageContent(content, role, imageUrls) {
  if (role === 'user') {
    // Check if this is a tool result message
    const toolResult = parseToolResult(content);
    if (toolResult) {
      const id = 'tr-' + (++toolBlockCounter);
      return `<div class="message tool-result">
        <div class="tool-result-header" onclick="toggleToolBlock('${id}')">
          <span class="tool-result-icon">&#8617;</span>
          <span class="tool-result-name">${esc(toolResult.name)}</span>
          <span class="tool-result-chevron" id="${id}-chev">&#9656;</span>
        </div>
        <div class="tool-result-body" id="${id}-body">${esc(toolResult.body)}</div>
      </div>`;
    }
    // Regular user message — with optional images
    let imgsHtml = '';
    if (imageUrls && imageUrls.length > 0) {
      imgsHtml = imageUrls.map(url =>
        `<img src="${esc(url)}" class="msg-image" onclick="window.open(this.src,'_blank')" title="click to open full size">`
      ).join('');
      imgsHtml = `<div class="msg-images">${imgsHtml}</div>`;
    }
    return `<div class="message user">${imgsHtml}${esc(content)}</div>`;
  }

  // Assistant message — parse into segments
  const segments = parseAssistantContent(content);

  if (segments.length === 0) {
    // Completely empty — don't render
    return '';
  }

  let inner = '';
  for (const seg of segments) {
    if (seg.type === 'text') {
      inner += marked.parse(seg.content);
    } else if (seg.type === 'tool_use') {
      inner += renderToolBlock('tool_use', seg.name, seg.content);
    }
  }

  return inner;
}

// --- Sessions ---
async function fetchSessions() {
  try {
    const res = await authFetch(`${API}/sessions`);
    if (res.status === 401) { showKeyModal(); return; }
    const data = await res.json();
    // Server returns sessions sorted by last_active DESC; assign decreasing order values to preserve that
    for (let i = 0; i < data.sessions.length; i++) {
      const s = data.sessions[i];
      if (!sessions[s.sessionId]) {
        sessions[s.sessionId] = { workspace: s.workspace, model: s.model || 'sonnet', messages: [], lastActive: data.sessions.length - i };
      }
    }
    renderSessionList();
  } catch (e) {
    showToast('failed to fetch sessions');
  }
}

function renderSessionList() {
  const el = document.getElementById('sessionList');
  const ids = Object.keys(sessions).sort((a, b) => (sessions[b].lastActive || 0) - (sessions[a].lastActive || 0));
  if (ids.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px;font-family:var(--font-mono);text-align:center;">no sessions yet</div>';
    return;
  }
  el.innerHTML = ids.map(id => {
    const s = sessions[id];
    const active = id === activeSessionId ? 'active' : '';
    const shortId = id.startsWith('pending-') ? '' : id.slice(0, 8);
    return `<div class="session-item ${active}" onclick="switchSession('${id}')" title="${esc(id)}">
      <span class="session-name">${esc(s.workspace)}</span>
      <span class="session-model">${esc(shortId)}</span>
      <button class="session-delete" onclick="event.stopPropagation();deleteSession('${id}')" title="remove">&times;</button>
    </div>`;
  }).join('');
}

async function switchSession(id, skipPush) {
  activeSessionId = id;
  if (!skipPush && !id.startsWith('pending-')) {
    history.pushState({ sessionId: id }, '', '/s/' + id);
  }
  renderSessionList();
  updateHeader();
  document.getElementById('messageInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;

  // Fetch history from server if we have no local messages and it's a real session
  const session = sessions[id];
  if (session && session.messages.length === 0 && !id.startsWith('pending-')) {
    try {
      const res = await authFetch(`${API}/sessions/${id}/history`);
      const data = await res.json();
      if (data.messages && data.messages.length > 0) {
        session.messages = data.messages.map(m => ({
          role: m.role === 'system' ? 'claude' : m.role,
          content: m.content,
          meta: m.durationMs != null ? { durationMs: m.durationMs, costUsd: m.costUsd } : undefined,
          imageUrls: m.imageUrls || undefined,
        }));
      }
    } catch (e) {}
  }

  renderChat();
  document.getElementById('messageInput').focus();
}

async function deleteSession(id) {
  try {
    await authFetch(`${API}/sessions/${id}`, { method: 'DELETE' });
  } catch (e) {}
  delete sessions[id];
  if (activeSessionId === id) {
    activeSessionId = null;
    history.pushState(null, '', '/');
    document.getElementById('messageInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('chatArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&gt;_</div><p>start a session to begin</p></div>';
    updateHeader();
  }
  renderSessionList();
}

function updateHeader() {
  const el = document.getElementById('mainHeader');
  if (!activeSessionId || !sessions[activeSessionId]) {
    el.innerHTML = '<span>select or create a session</span>';
  } else {
    const s = sessions[activeSessionId];
    const isPending = activeSessionId.startsWith('pending-');
    el.innerHTML = `<span>workspace</span><span class="workspace-badge">${esc(s.workspace)}</span>`
      + `<span class="model-badge">${esc(s.model || 'sonnet')}</span>`
      + (isPending ? '' : `<span class="model-badge" style="cursor:pointer;" onclick="navigator.clipboard.writeText('${esc(activeSessionId)}');showToast('session id copied')" title="click to copy">${esc(activeSessionId.slice(0,12))}...</span>`)
      + `<span class="header-spacer"></span>`
      + (isPending ? '' : `<button class="btn-compact" onclick="compactSession()" id="compactBtn">compact</button>`);
  }
}

// --- Chat ---
function renderChat() {
  const el = document.getElementById('chatArea');
  if (!activeSessionId || !sessions[activeSessionId]) return;
  const msgs = sessions[activeSessionId].messages;
  if (msgs.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&gt;_</div><p>send your first message</p></div>';
    return;
  }

  // Reset tool block counter for consistent IDs
  toolBlockCounter = 0;

  el.innerHTML = msgs.map(m => {
    const rendered = renderMessageContent(m.content, m.role === 'claude' ? 'assistant' : m.role, m.imageUrls);

    if (m.role === 'user') {
      return rendered;
    }

    // Assistant message — wrap in claude div with meta
    if (!rendered) {
      // Skip completely empty assistant messages
      if (m.meta) {
        return `<div class="message claude"><div class="meta">
          <span>${(m.meta.durationMs / 1000).toFixed(1)}s</span>
          <span>$${m.meta.costUsd.toFixed(4)}</span>
        </div></div>`;
      }
      return '';
    }

    let html = `<div class="message claude">${rendered}`;
    if (m.meta) {
      html += `<div class="meta">
        <span>${(m.meta.durationMs / 1000).toFixed(1)}s</span>
        <span>$${m.meta.costUsd.toFixed(4)}</span>
      </div>`;
    }
    html += '</div>';
    return html;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (sending || !activeSessionId) return;
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;

  const session = sessions[activeSessionId];
  session.messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  renderChat();

  // Add loading indicator
  const chatArea = document.getElementById('chatArea');
  const loader = document.createElement('div');
  loader.className = 'message loading';
  loader.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>thinking...';
  chatArea.appendChild(loader);
  chatArea.scrollTop = chatArea.scrollHeight;

  sending = true;
  document.getElementById('sendBtn').disabled = true;
  session.lastActive = Date.now();
  renderSessionList();

  try {
    const res = await authFetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        ...(activeSessionId.startsWith('pending-') ? { model: session.model, engine: session.engine } : { sessionId: activeSessionId }),
        workspace: session.workspace,
      }),
    });
    const data = await res.json();
    if (data.error) {
      session.messages.push({ role: 'claude', content: `**Error:** ${data.error}` });
    } else {
      // Update session ID if it changed (first message)
      if (data.sessionId !== activeSessionId) {
        sessions[data.sessionId] = session;
        delete sessions[activeSessionId];
        activeSessionId = data.sessionId;
        history.replaceState({ sessionId: activeSessionId }, '', '/s/' + activeSessionId);
        renderSessionList();
      }
      // Attach imageUrls to the preceding user message if present
      if (data.imageUrls && data.imageUrls.length > 0) {
        const lastUserMsg = [...session.messages].reverse().find(m => m.role === 'user');
        if (lastUserMsg) lastUserMsg.imageUrls = data.imageUrls;
      }
      session.messages.push({
        role: 'claude',
        content: data.response,
        meta: { durationMs: data.durationMs, costUsd: data.costUsd },
      });
    }
  } catch (e) {
    session.messages.push({ role: 'claude', content: `**Error:** ${e.message}` });
  }

  sending = false;
  document.getElementById('sendBtn').disabled = false;
  renderChat();
  document.getElementById('messageInput').focus();
}

// --- New chat modal ---
function showNewChatModal() {
  const container = document.getElementById('modalContainer');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>new session</h3>
        <p>workspace name — a directory will be created under the workspaces folder</p>
        <input type="text" id="workspaceInput" placeholder="my-project" autofocus
               onkeydown="if(event.key==='Enter')createSession()">
        <label>engine</label>
        <select id="engineSelect" onchange="updateModelPresets()">
          <option value="claude" selected>claude</option>
          <option value="opencode">opencode</option>
        </select>
        <label>model</label>
        <input type="text" id="modelInput" value="sonnet" list="modelPresets"
               placeholder="sonnet, opus, haiku, or full model ID">
        <datalist id="modelPresets"></datalist>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">cancel</button>
          <button class="btn-confirm" onclick="createSession()">create</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => {
    updateModelPresets();
    document.getElementById('workspaceInput').focus();
  }, 50);
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function createSession() {
  const input = document.getElementById('workspaceInput');
  const name = input.value.trim();
  if (!name) return;
  if (/[\/\\\.\.:]/.test(name)) {
    showToast('invalid workspace name');
    return;
  }
  const model = document.getElementById('modelInput').value.trim() || 'sonnet';
  const engine = document.getElementById('engineSelect').value;
  closeModal();

  // Use a temp ID until first message gives us the real one
  const tempId = 'pending-' + Date.now();
  sessions[tempId] = { workspace: name, model, engine, messages: [], lastActive: Date.now() };
  switchSession(tempId);
}

// --- Compact ---
async function compactSession() {
  if (sending || !activeSessionId || activeSessionId.startsWith('pending-')) return;
  const btn = document.getElementById('compactBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'compacting...'; }

  try {
    const res = await authFetch(`${API}/sessions/${activeSessionId}/compact`, { method: 'POST' });
    const data = await res.json();
    if (data.error) {
      showToast('compact failed: ' + data.error);
    } else {
      const session = sessions[activeSessionId];
      session.messages.push({
        role: 'claude',
        content: `*Context compacted*`,
        meta: { durationMs: data.durationMs, costUsd: data.costUsd },
      });
      renderChat();
    }
  } catch (e) {
    showToast('compact failed: ' + e.message);
  }

  if (btn) { btn.disabled = false; btn.textContent = 'compact'; }
}

// --- Auto-resize textarea ---
const input = document.getElementById('messageInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// --- Toast ---
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// --- Utils ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function logout() {
  apiKey = '';
  localStorage.removeItem('apiKey');
  sessions = {};
  activeSessionId = null;
  renderSessionList();
  document.getElementById('chatArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&gt;_</div><p>start a session to begin</p></div>';
  document.getElementById('messageInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  showKeyModal();
}

// --- Engine/model presets ---
const engineModels = {
  claude: [
    { value: 'sonnet', label: 'sonnet' },
    { value: 'opus', label: 'opus' },
    { value: 'haiku', label: 'haiku' },
  ],
  opencode: [
    { value: 'custom/gpt-5', label: 'GPT-5' },
    { value: 'custom/gpt-5-mini', label: 'GPT-5 Mini' },
    { value: 'opencode/big-pickle', label: 'Big Pickle (free)' },
    { value: 'opencode/gpt-5-nano', label: 'GPT-5 Nano (free)' },
  ],
};

function updateModelPresets() {
  const engine = document.getElementById('engineSelect').value;
  const datalist = document.getElementById('modelPresets');
  const input = document.getElementById('modelInput');
  const models = engineModels[engine] || [];
  datalist.innerHTML = models.map(m => `<option value="${m.value}" label="${m.label}">`).join('');
  input.value = models.length ? models[0].value : '';
  input.placeholder = engine === 'claude' ? 'sonnet, opus, haiku, or model ID' : 'billiax/gpt-5, or provider/model';
}

// --- URL routing ---
function getSessionIdFromUrl() {
  const match = location.pathname.match(/^\/s\/([a-f0-9-]+)$/);
  return match ? match[1] : null;
}

window.addEventListener('popstate', (e) => {
  const id = e.state?.sessionId || getSessionIdFromUrl();
  if (id && sessions[id]) {
    switchSession(id, true);
  } else if (!id) {
    activeSessionId = null;
    renderSessionList();
    document.getElementById('chatArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&gt;_</div><p>start a session to begin</p></div>';
    document.getElementById('messageInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    updateHeader();
  }
});

// --- Init ---
fetchSessions().then(async () => {
  const urlSessionId = getSessionIdFromUrl();
  if (urlSessionId) {
    if (!sessions[urlSessionId]) {
      // Session not in sidebar yet — try to load it from server
      try {
        const res = await authFetch(`${API}/sessions/${urlSessionId}/history`);
        if (res.ok) {
          const data = await res.json();
          sessions[urlSessionId] = {
            workspace: data.workspace || 'unknown',
            model: data.model || 'sonnet',
            messages: [],
            lastActive: 0,
          };
          renderSessionList();
        }
      } catch (e) {}
    }
    if (sessions[urlSessionId]) {
      await switchSession(urlSessionId, true);
    }
  }
});
</script>
