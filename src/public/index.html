<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a0c;
  --bg-panel: #111114;
  --bg-surface: #18181c;
  --bg-hover: #1f1f24;
  --bg-active: #26262c;
  --border: #2a2a32;
  --border-subtle: #1e1e25;
  --text-primary: #e4e4e8;
  --text-secondary: #8a8a96;
  --text-muted: #55555f;
  --accent: #c4815c;
  --accent-dim: #9e6844;
  --accent-glow: rgba(196, 129, 92, 0.12);
  --user-bg: #1a1d2a;
  --claude-bg: #141416;
  --danger: #c45c5c;
  --success: #5cc47a;
  --radius: 6px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  display: flex;
  overflow: hidden;
}

/* ---- Sidebar ---- */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border-subtle);
}

.sidebar-logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-logo::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  display: inline-block;
}

.btn-new {
  width: 100%;
  padding: 9px 12px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.btn-new:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: var(--accent-glow);
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-track { background: transparent; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.session-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 2px;
  position: relative;
}

.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-active); }

.session-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.session-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-model {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-left: 6px;
  flex-shrink: 0;
}

.session-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.session-item:hover .session-delete { opacity: 1; }
.session-delete:hover { color: var(--danger); background: rgba(196,92,92,0.1); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-api-help {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-api-help:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
}

/* API docs modal */
.modal-wide { width: 560px; max-height: 80vh; overflow-y: auto; }
.modal-wide::-webkit-scrollbar { width: 4px; }
.modal-wide::-webkit-scrollbar-track { background: transparent; }
.modal-wide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.api-section { margin-bottom: 20px; }

.api-section h4 {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}

.api-section .method {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-primary);
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px 8px;
  display: inline-block;
  margin-right: 6px;
}

.api-section .endpoint {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
}

.api-section .desc {
  font-size: 12px;
  color: var(--text-muted);
  margin: 6px 0;
  line-height: 1.5;
}

.api-code {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text-secondary);
  white-space: pre;
  overflow-x: auto;
  line-height: 1.55;
  margin: 8px 0;
}

.api-code .hl { color: var(--accent); }
.api-code .cm { color: var(--text-muted); }

/* ---- Main ---- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
}

.main-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-panel);
}

.main-header .workspace-badge {
  background: var(--bg-surface);
  padding: 3px 10px;
  border-radius: 3px;
  color: var(--accent);
  font-size: 12px;
  border: 1px solid var(--border-subtle);
}

.main-header .model-badge {
  background: var(--bg-surface);
  padding: 3px 10px;
  border-radius: 3px;
  color: var(--text-muted);
  font-size: 11px;
  border: 1px solid var(--border-subtle);
}

.header-spacer { flex: 1; }

.btn-compact {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-compact:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
}

.btn-compact:disabled { opacity: 0.3; cursor: not-allowed; }

/* Modal select */
.modal select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
  appearance: none;
  cursor: pointer;
}

.modal select:focus { border-color: var(--accent-dim); }

.modal label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

/* ---- Chat area ---- */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 32px;
  opacity: 0.3;
  font-family: var(--font-mono);
}

.empty-state p {
  font-size: 13px;
  font-family: var(--font-mono);
}

.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  animation: msgIn 0.25s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: var(--user-bg);
  border: 1px solid #252840;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
}

.message.claude {
  align-self: flex-start;
  background: var(--claude-bg);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
}

.message.claude .meta {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
  letter-spacing: 0.03em;
}

/* Markdown inside claude messages */
.message.claude h1, .message.claude h2, .message.claude h3 {
  font-family: var(--font-sans);
  font-weight: 600;
  margin: 12px 0 6px;
  color: var(--text-primary);
}

.message.claude h1 { font-size: 18px; }
.message.claude h2 { font-size: 16px; }
.message.claude h3 { font-size: 14px; }
.message.claude p { margin: 6px 0; }
.message.claude ul, .message.claude ol { padding-left: 20px; margin: 6px 0; }
.message.claude li { margin: 3px 0; }

.message.claude code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border-subtle);
}

.message.claude pre {
  margin: 10px 0;
  border-radius: var(--radius);
  overflow-x: auto;
  border: 1px solid var(--border);
  background: var(--bg-deep) !important;
}

.message.claude pre code {
  display: block;
  padding: 12px 16px;
  background: transparent;
  border: none;
  line-height: 1.55;
  white-space: pre;
}

.message.claude a {
  color: var(--accent);
  text-decoration: none;
}

.message.claude a:hover { text-decoration: underline; }

.message.claude table {
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
  width: 100%;
}

.message.claude th, .message.claude td {
  padding: 6px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.message.claude th {
  background: var(--bg-surface);
  font-weight: 500;
}

/* Loading indicator */
.message.loading {
  align-self: flex-start;
  background: var(--claude-bg);
  border: 1px solid var(--border-subtle);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.loading-dots {
  display: flex;
  gap: 4px;
}

.loading-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-dim);
  animation: pulse 1.4s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ---- Input bar ---- */
.input-bar {
  padding: 16px 24px;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-panel);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-bar textarea {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  min-height: 42px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.2s;
}

.input-bar textarea:focus { border-color: var(--accent-dim); }

.input-bar textarea::placeholder {
  color: var(--text-muted);
}

.btn-send {
  padding: 10px 20px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #0a0a0c;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.btn-send:hover { background: #d4916c; }
.btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

/* ---- Modal ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.15s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 360px;
  animation: slideUp 0.2s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal h3 {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: 0.03em;
}

.modal p {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.modal input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.modal input:focus { border-color: var(--accent-dim); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.modal-actions button {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}

.btn-cancel {
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: 1px solid var(--border) !important;
}

.btn-cancel:hover { background: var(--bg-hover); }

.btn-confirm {
  background: var(--accent);
  color: #0a0a0c;
  font-weight: 600;
}

.btn-confirm:hover { background: #d4916c; }

/* Error toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-surface);
  border: 1px solid var(--danger);
  color: var(--text-primary);
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--font-mono);
  z-index: 200;
  animation: fadeIn 0.2s ease-out;
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Claude Code</div>
    <button class="btn-new" onclick="showNewChatModal()">+ new session</button>
  </div>
  <div class="session-list" id="sessionList"></div>
  <div class="sidebar-footer">
    <span>sessions are in-memory</span>
    <button class="btn-api-help" onclick="showApiModal()">api docs</button>
  </div>
</aside>

<main class="main">
  <div class="main-header" id="mainHeader">
    <span>select or create a session</span>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-state-icon">&gt;_</div>
      <p>start a session to begin</p>
    </div>
  </div>
  <div class="input-bar">
    <textarea id="messageInput" placeholder="send a message..." rows="1" disabled></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>send</button>
  </div>
</main>

<div id="modalContainer"></div>

<script>
const API = '';
let sessions = {};       // { sessionId: { workspace, model, messages: [{role,content,meta?}] } }
let activeSessionId = null;
let sending = false;

// --- Markdown ---
marked.setOptions({
  breaks: true,
  gfm: true,
});

// --- Sessions ---
async function fetchSessions() {
  try {
    const res = await fetch(`${API}/sessions`);
    const data = await res.json();
    for (const s of data.sessions) {
      if (!sessions[s.sessionId]) {
        sessions[s.sessionId] = { workspace: s.workspace, model: s.model || 'sonnet', messages: [] };
      }
    }
    renderSessionList();
  } catch (e) {
    showToast('failed to fetch sessions');
  }
}

function renderSessionList() {
  const el = document.getElementById('sessionList');
  const ids = Object.keys(sessions);
  if (ids.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px;font-family:var(--font-mono);text-align:center;">no sessions yet</div>';
    return;
  }
  el.innerHTML = ids.map(id => {
    const s = sessions[id];
    const active = id === activeSessionId ? 'active' : '';
    return `<div class="session-item ${active}" onclick="switchSession('${id}')">
      <span class="session-name">${esc(s.workspace)}</span>
      <span class="session-model">${esc(s.model || '')}</span>
      <button class="session-delete" onclick="event.stopPropagation();deleteSession('${id}')" title="remove">&times;</button>
    </div>`;
  }).join('');
}

async function switchSession(id) {
  activeSessionId = id;
  renderSessionList();
  updateHeader();
  document.getElementById('messageInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;

  // Fetch history from server if we have no local messages and it's a real session
  const session = sessions[id];
  if (session && session.messages.length === 0 && !id.startsWith('pending-')) {
    try {
      const res = await fetch(`${API}/sessions/${id}/history`);
      const data = await res.json();
      if (data.messages && data.messages.length > 0) {
        session.messages = data.messages.map(m => ({
          role: m.role === 'system' ? 'claude' : m.role,
          content: m.content,
          meta: m.durationMs != null ? { durationMs: m.durationMs, costUsd: m.costUsd } : undefined,
        }));
      }
    } catch (e) {}
  }

  renderChat();
  document.getElementById('messageInput').focus();
}

async function deleteSession(id) {
  try {
    await fetch(`${API}/sessions/${id}`, { method: 'DELETE' });
  } catch (e) {}
  delete sessions[id];
  if (activeSessionId === id) {
    activeSessionId = null;
    document.getElementById('messageInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('chatArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&gt;_</div><p>start a session to begin</p></div>';
    updateHeader();
  }
  renderSessionList();
}

function updateHeader() {
  const el = document.getElementById('mainHeader');
  if (!activeSessionId || !sessions[activeSessionId]) {
    el.innerHTML = '<span>select or create a session</span>';
  } else {
    const s = sessions[activeSessionId];
    const isPending = activeSessionId.startsWith('pending-');
    el.innerHTML = `<span>workspace</span><span class="workspace-badge">${esc(s.workspace)}</span>`
      + `<span class="model-badge">${esc(s.model || 'sonnet')}</span>`
      + `<span class="header-spacer"></span>`
      + (isPending ? '' : `<button class="btn-compact" onclick="compactSession()" id="compactBtn">compact</button>`);
  }
}

// --- Chat ---
function renderChat() {
  const el = document.getElementById('chatArea');
  if (!activeSessionId || !sessions[activeSessionId]) return;
  const msgs = sessions[activeSessionId].messages;
  if (msgs.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&gt;_</div><p>send your first message</p></div>';
    return;
  }
  el.innerHTML = msgs.map(m => {
    if (m.role === 'user') {
      return `<div class="message user">${esc(m.content)}</div>`;
    } else {
      let html = `<div class="message claude">${marked.parse(m.content)}`;
      if (m.meta) {
        html += `<div class="meta">
          <span>${(m.meta.durationMs / 1000).toFixed(1)}s</span>
          <span>$${m.meta.costUsd.toFixed(4)}</span>
        </div>`;
      }
      html += '</div>';
      return html;
    }
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (sending || !activeSessionId) return;
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;

  const session = sessions[activeSessionId];
  session.messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  renderChat();

  // Add loading indicator
  const chatArea = document.getElementById('chatArea');
  const loader = document.createElement('div');
  loader.className = 'message loading';
  loader.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>thinking...';
  chatArea.appendChild(loader);
  chatArea.scrollTop = chatArea.scrollHeight;

  sending = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        ...(activeSessionId.startsWith('pending-') ? { model: session.model } : { sessionId: activeSessionId }),
        workspace: session.workspace,
      }),
    });
    const data = await res.json();
    if (data.error) {
      session.messages.push({ role: 'claude', content: `**Error:** ${data.error}` });
    } else {
      // Update session ID if it changed (first message)
      if (data.sessionId !== activeSessionId) {
        sessions[data.sessionId] = session;
        delete sessions[activeSessionId];
        activeSessionId = data.sessionId;
        renderSessionList();
      }
      session.messages.push({
        role: 'claude',
        content: data.response,
        meta: { durationMs: data.durationMs, costUsd: data.costUsd },
      });
    }
  } catch (e) {
    session.messages.push({ role: 'claude', content: `**Error:** ${e.message}` });
  }

  sending = false;
  document.getElementById('sendBtn').disabled = false;
  renderChat();
  document.getElementById('messageInput').focus();
}

function createSession() {
  const input = document.getElementById('workspaceInput');
  const name = input.value.trim();
  if (!name) return;
  if (/[\/\\\.\.:]/.test(name)) {
    showToast('invalid workspace name');
    return;
  }
  const model = document.getElementById('modelSelect').value;
  closeModal();

  // Use a temp ID until first message gives us the real one
  const tempId = 'pending-' + Date.now();
  sessions[tempId] = { workspace: name, model, messages: [] };
  switchSession(tempId);
}

// --- Compact ---
async function compactSession() {
  if (sending || !activeSessionId || activeSessionId.startsWith('pending-')) return;
  const btn = document.getElementById('compactBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'compacting...'; }

  try {
    const res = await fetch(`${API}/sessions/${activeSessionId}/compact`, { method: 'POST' });
    const data = await res.json();
    if (data.error) {
      showToast('compact failed: ' + data.error);
    } else {
      const session = sessions[activeSessionId];
      session.messages.push({
        role: 'claude',
        content: `*Context compacted*`,
        meta: { durationMs: data.durationMs, costUsd: data.costUsd },
      });
      renderChat();
    }
  } catch (e) {
    showToast('compact failed: ' + e.message);
  }

  if (btn) { btn.disabled = false; btn.textContent = 'compact'; }
}

// --- Auto-resize textarea ---
const input = document.getElementById('messageInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// --- Toast ---
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// --- Utils ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
